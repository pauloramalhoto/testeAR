<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari RA - Explorador de Cães</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* CSS para garantir que a UI não bloqueia o touch na RA */
        .ui-overlay {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none; /* Permite clicar através do texto */
        }
        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: auto; /* Permite clicar nos botões */
        }
        button {
            padding: 15px 25px;
            font-size: 16px;
            border-radius: 50px;
            border: none;
            background: #2ecc71;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- UI Overlay com título -->
    <div class="ui-overlay">
        <h1 style="color: white; font-family: sans-serif; text-shadow: 2px 2px 4px #000; margin: 0;">Explorador de Cães 🐕</h1>
    </div>

    <!-- Botões de interação -->
    <div class="controls">
        <button onclick="toggleRotation()">Rodar Cão</button>
    </div>

    <a-scene embedded 
             vr-mode-ui="enabled: false" 
             arjs="sourceType: webcam; debugUIEnabled: false;"
             renderer="colorManagement: true; physicallyCorrectLights: true;">
        
        <a-assets>
            <a-asset-item id="cao-model" src="scene.gltf"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity id="meu-cao"
                      gltf-model="#cao-model" 
                      scale="0.3 0.3 0.3" 
                      position="0 0 0">
            </a-entity>

            <!-- Painel Informativo -->
            <a-entity position="0 1.2 0" rotation="0 0 0">
                <a-text value="Canis lupus familiaris" 
                        align="center" color="#FFF" scale="1.5 1.5 1.5"
                        side="double"
                        geometry="primitive: plane; width: 2; height: 0.5"
                        material="color: #333; opacity: 0.8"></a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let rodando = false;
        function toggleRotation() {
            const cao = document.getElementById('meu-cao');
            rodando = !rodando;
            if (rodando) {
                cao.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear');
            } else {
                cao.removeAttribute('animation');
            }
        }
    </script>
</body>
</html>
</body>
</html>
