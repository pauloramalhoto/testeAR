<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari RA: Estável</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .ui-overlay { position: fixed; bottom: 20px; width: 100%; text-align: center; z-index: 9999; }
        button { background: #EF4444; color: white; padding: 15px 30px; border-radius: 20px; border: none; font-size: 16px; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Marcador do Cão -->
        <a-marker type="pattern" url="pattern-Gemini_Generated_Image_u4nhbwu4nhbwu4nh.patt">
            <a-box position="0 0.5 0" color="red"></a-box>
        </a-marker>

        <!-- Marcador da Célula -->
        <a-marker type="pattern" url="pattern-Gemini_Generated_Image_np9v2pnp9v2pnp9v.patt">
            <a-box position="0 0.5 0" color="blue"></a-box>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <div class="ui-overlay">
        <button onclick="document.location.reload()">Reiniciar Câmara</button>
    </div>

</body>
</html>
