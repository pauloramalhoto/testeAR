<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safari Escolar RA</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
    <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .ar-view { display: block; position: relative; height: 100vh; }
        .album-view { display: none; height: 100vh; overflow-y: auto; background: #f3f4f6; padding-bottom: 80px; }
        .cromo-locked { filter: grayscale(1) brightness(0.3); }
        /* Ajuste para "safe areas" (notch) */
        .safe-padding { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>

    <!-- Ecrã RA -->
    <div id="view-ar" class="ar-view">
        <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;" gesture-detector>
            <a-assets>
                <a-asset-item id="cao-model" src="labrador_dog/scene.gltf"></a-asset-item>
                <a-asset-item id="cell-model" src="animal_cell/scene.gltf"></a-asset-item>
            </a-assets>

            <a-marker type="pattern" url="pattern-Gemini_Generated_Image_u4nhbwu4nhbwu4nh.patt" id="marker-cao">
                <a-entity gltf-model="#cao-model" scale="0.2 0.2 0.2" rotation="-90 0 0" gesture-handler></a-entity>
            </a-marker>

            <a-marker type="pattern" url="pattern-Gemini_Generated_Image_np9v2pnp9v2pnp9v.patt" id="marker-cell">
                <a-entity gltf-model="#cell-model" scale="0.3 0.3 0.3" gesture-handler></a-entity>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>
        
        <button onclick="toggleView()" class="fixed top-6 right-6 bg-blue-600 text-white p-3 rounded-full shadow-lg z-[9999]">📒</button>
    </div>

    <!-- Ecrã Caderneta -->
    <div id="view-album" class="album-view p-6 safe-padding">
        <h1 class="text-2xl font-bold text-center mb-6">Caderneta Safari 🐾</h1>
        <div class="grid grid-cols-2 gap-4" id="album-grid"></div>
        <div class="fixed bottom-0 left-0 w-full p-4 bg-white border-t border-gray-200">
            <button onclick="partilharConquistas()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold mb-2">Partilhar Conquistas 🌟</button>
            <button onclick="toggleView()" class="w-full bg-gray-500 text-white p-4 rounded-xl font-bold">Voltar ao Safari</button>
        </div>
    </div>

    <script>
        let colheita = JSON.parse(localStorage.getItem('safari_cromos')) || { cao: false, celula: false };
        const cromos = {
            cao: { nome: "Labrador", desc: "O fiel companheiro." },
            celula: { nome: "Célula", desc: "Unidade da vida." }
        };

        function toggleView() {
            const ar = document.getElementById('view-ar');
            const album = document.getElementById('view-album');
            if(ar.style.display === 'none') { ar.style.display = 'block'; album.style.display = 'none'; }
            else { ar.style.display = 'none'; album.style.display = 'block'; renderAlbum(); }
        }

        function marcarEncontrado(id) {
            if(!colheita[id]) {
                colheita[id] = true;
                localStorage.setItem('safari_cromos', JSON.stringify(colheita));
                alert("Novo cromo desbloqueado: " + cromos[id].nome + "!");
            }
        }

        function renderAlbum() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = '';
            for(const id in cromos) {
                const isFound = colheita[id];
                grid.innerHTML += `<div class="bg-white p-4 rounded-xl shadow border-2 ${isFound ? 'border-green-400' : 'border-gray-200 cromo-locked'}">
                    <h2 class="font-bold">${cromos[id].nome}</h2>
                    <p class="text-xs text-gray-500 mt-1">${isFound ? cromos[id].desc : "Por encontrar..."}</p>
                </div>`;
            }
        }

        document.querySelector('#marker-cao').addEventListener('markerFound', () => marcarEncontrado('cao'));
        document.querySelector('#marker-cell').addEventListener('markerFound', () => marcarEncontrado('celula'));

        function partilharConquistas() {
            const count = Object.values(colheita).filter(Boolean).length;
            const text = `Safari Escolar: Já encontrei ${count}/2 animais! 🐾`;
            if (navigator.share) { navigator.share({title: 'Safari Escolar', text: text}); }
            else { alert(text); }
        }
    </script>
</body>
</html>
