<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade AR: Explorador de Cães</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded 
             vr-mode-ui="enabled: false" 
             arjs="sourceType: webcam; debugUIEnabled: false;"
             renderer="colorManagement: true; physicallyCorrectLights: true;">
        
        <a-assets>
            <a-asset-item id="cao-model" src="scene.gltf"></a-asset-item>
        </a-assets>

        <!-- Iluminação melhorada para dar volume -->
        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.2" castShadow="true"></a-light>

        <a-marker preset="hiro">
            <!-- Modelo 3D com sombras ativadas -->
            <a-entity gltf-model="#cao-model" 
                      scale="0.3 0.3 0.3" 
                      position="0 0 0"
                      shadow="receive: true">
            </a-entity>

            <!-- Painel Informativo em RA mais elegante -->
            <a-plane position="0 1.2 0" rotation="-90 0 0" width="2" height="0.6" color="#333" opacity="0.7">
                <a-text value="Cão (Canis lupus familiaris)\nO melhor amigo do homem." 
                        align="center" color="#FFF" scale="0.5 0.5 0.5" position="0 0 0.05"></a-text>
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <div style="position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; text-shadow: 2px 2px 4px #000;">
        <h1>Explorador de Cães 🐕</h1>
    </div>
</body>
</html>
