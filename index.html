<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador AR: Cão 3D</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Componente para permitir rotação com toque -->
    <script>
        AFRAME.registerComponent('rotator', {
            tick: function () {
                this.el.object3D.rotation.y += 0.01;
            }
        });
    </script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded 
             vr-mode-ui="enabled: false" 
             arjs="sourceType: webcam; debugUIEnabled: false;"
             renderer="colorManagement: true; physicallyCorrectLights: true;">
        
        <a-assets>
            <!-- Carregamento explícito dos materiais -->
            <a-asset-item id="cao-model" src="scene.gltf"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <!-- Modelo do cão com rotação automática para interação visual -->
            <a-entity id="meu-cao"
                      gltf-model="#cao-model" 
                      scale="0.4 0.4 0.4" 
                      position="0 0 0"
                      rotator>
            </a-entity>

            <!-- Texto na vertical para não piscar (evitar Z-fighting) -->
            <a-entity position="0 1.5 0" rotation="0 0 0">
                <a-text value="Cão (Canis lupus familiaris)\nO melhor amigo do homem." 
                        align="center" color="#FFF" scale="1.5 1.5 1.5"
                        side="double"
                        geometry="primitive: plane; width: 2; height: 0.5"
                        material="color: #333; opacity: 0.8"></a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <div style="position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; text-shadow: 2px 2px 4px #000;">
        <h1>Explorador de Cães 🐕</h1>
        <p>Gira o marcador para ver os detalhes!</p>
    </div>
</body>
</html>
