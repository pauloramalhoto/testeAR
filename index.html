<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari RA: Quiz Interativo</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
    <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
    <style>
        .ui-overlay { position: fixed; bottom: 20px; width: 100%; text-align: center; z-index: 9999; }
        .quiz-panel { position: fixed; top: 20px; left: 20px; right: 20px; background: white; padding: 20px; border-radius: 15px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10000; }
        button { background: #10B981; color: white; padding: 12px 24px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;" gesture-detector>
        
        <a-assets>
            <a-asset-item id="cao-model" src="labrador_dog/scene.gltf"></a-asset-item>
            <a-asset-item id="cell-model" src="animal_cell/scene.gltf"></a-asset-item>
        </a-assets>

        <!-- Marcador do Labrador -->
        <a-marker type="pattern" url="pattern-Gemini_Generated_Image_u4nhbwu4nhbwu4nh.patt" id="marker-cao">
            <a-entity gltf-model="#cao-model" scale="0.2 0.2 0.2" rotation="-90 0 0" class="clickable" gesture-handler></a-entity>
        </a-marker>

        <!-- Marcador da Célula -->
        <a-marker type="pattern" url="pattern-Gemini_Generated_Image_np9v2pnp9v2pnp9v.patt" id="marker-cell">
            <a-entity gltf-model="#cell-model" scale="0.3 0.3 0.3" class="clickable" gesture-handler></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <div id="quiz-panel" class="quiz-panel">
        <h2 id="pergunta">Qual é a raça deste cão?</h2>
        <button onclick="verificar(true)">Labrador</button>
        <button onclick="verificar(false)" style="background:#EF4444;">Poodle</button>
        <p id="resultado"></p>
    </div>

    <div class="ui-overlay">
        <button onclick="document.location.reload()">Reiniciar Câmara</button>
    </div>

    <script>
        const quiz = document.getElementById('quiz-panel');
        const markerCao = document.querySelector('#marker-cao');

        markerCao.addEventListener('markerFound', () => {
            quiz.style.display = 'block';
        });

        function verificar(correto) {
            document.getElementById('resultado').innerText = correto ? "Correto! 🐾" : "Tenta outra vez!";
        }
    </script>
</body>
</html>
