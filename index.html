<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari RA: Animais 3D</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
    <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
        .ui-overlay { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 9999; }
        button { background: #EF4444; color: white; padding: 12px 24px; border-radius: 20px; border: none; font-weight: bold; pointer-events: auto; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded 
             vr-mode-ui="enabled: false" 
             arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
             gesture-detector>
        
        <a-assets>
            <a-asset-item id="cao-model" src="lavrador_dog/scene.gltf"></a-asset-item>
            <a-asset-item id="cell-model" src="animal_cell/scene.gltf"></a-asset-item>
        </a-assets>

        <!-- Marcador para o Cão -->
        <a-marker type="pattern" url="pattern-Gemini_Generated_Image_u4nhbwu4nhbwu4nh.patt">
            <a-entity id="entidade-cao"
                      gltf-model="#cao-model" 
                      scale="0.3 0.3 0.3" 
                      rotation="-90 0 0"
                      class="clickable"
                      gesture-handler
                      animation-mixer>
            </a-entity>
        </a-marker>

        <!-- Marcador para a Célula -->
        <a-marker type="pattern" url="pattern-Gemini_Generated_Image_np9v2pnp9v2pnp9v.patt">
            <a-entity id="entidade-celula"
                      gltf-model="#cell-model" 
                      scale="0.5 0.5 0.5" 
                      class="clickable"
                      gesture-handler
                      animation-mixer>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <div class="ui-overlay">
        <button onclick="document.location.reload()">Reiniciar Câmara</button>
    </div>

</body>
</html>
