<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari RA - Explorador</title>
    <!-- A-Frame, AR.js e Extras para Animações -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <style>
        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; pointer-events: auto; }
        .info-panel { position: absolute; right: 20px; top: 20px; width: 250px; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 15px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); pointer-events: auto; }
        button { background: #10B981; color: white; padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <a-asset-item id="cao-model" src="scene.gltf"></a-asset-item>
        </a-assets>

        <!-- Marcador Customizado -->
        <a-marker type="pattern" url="pattern-Gemini_Generated_Image_u4nhbwu4nhbwu4nh.patt" id="marker-cao">
            <a-entity id="meu-cao" gltf-model="#cao-model" scale="0.3 0.3 0.3" position="0 0 0" animation-mixer></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <!-- UI Overlay -->
    <div class="ui-overlay">
        <div id="panel-info" class="info-panel">
            <h2 id="animal-title" class="font-bold text-lg mb-2">Cão</h2>
            <p id="animal-desc" class="text-sm">Explora o modelo 3D...</p>
            <button onclick="document.getElementById('panel-info').style.display='none'" class="mt-4 bg-gray-500 text-xs w-full">Fechar</button>
        </div>

        <div class="controls">
            <button onclick="rodarModelo()">Rodar</button>
            <button onclick="mostrarInfo()">Info</button>
            <button onclick="document.location.reload()" style="background:#EF4444;">Sair</button>
        </div>
    </div>

    <script>
        function rodarModelo() {
            const el = document.querySelector('#meu-cao');
            const rot = el.getAttribute('rotation');
            el.setAttribute('rotation', {x: rot.x, y: rot.y + 45, z: rot.z});
        }

        function mostrarInfo() {
            document.getElementById('panel-info').style.display = 'block';
        }

        // Deteção de marcadores para info dinâmica
        const marker = document.querySelector('#marker-cao');
        marker.addEventListener('markerFound', () => {
            document.getElementById('animal-title').innerText = "Cão Explorador";
            document.getElementById('animal-desc').innerText = "Este é um cão. Eles têm um olfato incrível!";
        });
    </script>
</body>
</html>
